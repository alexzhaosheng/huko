name: edge-image

# Builds the docker image on every push to main and publishes it to
# ghcr.io/alexzhaosheng/huko:edge. Multi-arch (linux/amd64 +
# linux/arm64) so Apple Silicon and AWS Graviton users can pull
# without QEMU on their end.
#
# This is the "fresh from main" channel — anyone pinning their
# `huko docker run` to a real release uses :latest (once the release
# pipeline lands). Until then, :edge is the only published tag and
# the wrapper's default points at it. See docs/cicd.md.

on:
  push:
    branches: [main]
    paths:
      # Don't rebuild for doc-only changes — docker layout is unaffected.
      - "package.json"
      - "package-lock.json"
      - "server/**"
      - "shared/**"
      - "bin/**"
      - "docker/Dockerfile"
      - ".github/workflows/edge-image.yml"
  workflow_dispatch:
    # Manual trigger for re-running after fixing the workflow itself.

permissions:
  contents: read
  packages: write

concurrency:
  # Newer pushes supersede older in-flight runs — no point publishing
  # an outdated image after a fast follow-up commit.
  group: edge-image
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (for arm64 emulation on x86 runner)
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push :edge
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/alexzhaosheng/huko:edge
            ghcr.io/alexzhaosheng/huko:edge-${{ github.sha }}
          # Use GitHub Actions cache so subsequent builds with the
          # same Dockerfile layers reuse layers across runs.
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Embed source-of-truth metadata so `docker inspect` shows
          # which commit the image was built from.
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}

      - name: Smoke test (amd64)
        # Pull what we just pushed and verify it runs `huko --help`
        # cleanly. Uses the SHA-pinned tag so we test exactly what
        # we just built, not a possibly-newer :edge.
        run: |
          docker run --rm --platform linux/amd64 \
            ghcr.io/alexzhaosheng/huko:edge-${{ github.sha }} \
            huko --help | head -5
